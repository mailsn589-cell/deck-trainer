<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medical Deck Trainer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.6.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2024.6.1/core.js"></script>
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Medical Deck Trainer</h1>
      <p class="lead">Deck-based learning with spaced repetition and topic filters.</p>
    </header>

    <section class="panel deck-panel">
      <h2>Deck</h2>
      <div class="grid-two">
        <div class="field">
          <label for="deck-select">Deck</label>
          <select id="deck-select"></select>
        </div>
        <div class="field">
          <label for="topic-filter">Topic Filter</label>
          <select id="topic-filter"></select>
        </div>
      </div>
      <div class="grid-two">
        <div class="field">
          <label for="search-input">Search</label>
          <input id="search-input" type="text" placeholder="Find term or definition">
        </div>
        <div class="field end-row">
          <button id="clear-filters" class="secondary">Clear Filters</button>
        </div>
      </div>
      <p id="deck-status" class="muted"></p>
      <p id="filter-status" class="muted"></p>
    </section>

    <section class="panel progress-panel">
      <h2>Progress</h2>
      <div class="progress-stats">
        <span id="due-count" class="badge">Due: 0</span>
        <span id="reviewed-count" class="badge">Reviewed: 0</span>
        <span id="streak-count" class="badge">Streak: 0</span>
      </div>
    </section>

    <section class="panel learn-panel">
      <div class="panel-head">
        <h2>Learn</h2>
        <p id="learn-side" class="badge"></p>
      </div>
      <p id="learn-position" class="muted"></p>
      <article id="learn-card" class="card" aria-live="polite"></article>
      <div class="buttons">
        <button id="learn-prev" class="secondary">Previous</button>
        <button id="learn-reveal">Reveal Answer</button>
        <button id="learn-next" class="secondary">Next</button>
      </div>
      <div class="rate-buttons">
        <button id="rate-again" class="danger">Again</button>
        <button id="rate-hard" class="warn">Hard</button>
        <button id="rate-good">Good</button>
        <button id="rate-easy" class="success">Easy</button>
      </div>
      <button id="reset-progress" class="secondary">Reset Deck Progress</button>
    </section>

    <section class="panel practice-panel">
      <h2>Practice</h2>
      <p id="practice-prompt"></p>
      <p id="practice-progress" class="muted"></p>
      <div id="practice-options" class="option-grid"></div>
      <p id="practice-result" class="result" aria-live="polite"></p>
      <button id="practice-reset" class="secondary">Restart Practice</button>
    </section>
  </main>

  <script type="py" src="deck_trainer.py" config='{"packages": []}'></script>
</body>
</html>
